[Sleep]
# This 2010 MacBook Pro has working ACPI S3; avoid the much shallower s2idle.
SuspendState=mem
MemorySleepMode=deep

# The swap partition is larger than RAM.  Prod2 passed boot plus a real,
# lid-triggered deep-S3 cycle with zero kernel or Nouveau faults.  Direct S4
# is enabled; GRUB must boot prod2 to restore images written by prod2.
AllowSuspend=yes
AllowHibernation=yes
AllowHybridSleep=no
AllowSuspendThenHibernate=no
HibernateMode=shutdown
HibernateDelaySec=1h
HibernateOnACPower=yes

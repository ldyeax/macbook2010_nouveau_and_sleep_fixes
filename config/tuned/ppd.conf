[main]
# KDE selects one of these explicit profiles; do not add a second implicit
# AC/battery remapping layer on this machine.
default=balanced
battery_detection=false
sysfs_acpi_monitor=false

[profiles]
# PPD profile = TuneD profile
power-saver=bigmac-power-saver
balanced=bigmac-balanced
performance=bigmac-performance

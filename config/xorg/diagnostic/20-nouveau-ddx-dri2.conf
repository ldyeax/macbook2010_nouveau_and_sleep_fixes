Section "ServerFlags"
	Option "DontZap" "false"
EndSection

Section "InputClass"
	Identifier "Keyboard Defaults"
	MatchIsKeyboard "Yes"
	Option "XkbOptions" "terminate:ctrl_alt_bksp"
EndSection

Section "Device"
	Identifier "Nouveau GT330M"
	Driver "nouveau"
	# xf86-video-nouveau 1.0.18 deliberately defaults EXA to DRI2.
	# Use this only to test whether the DRI3/Present path contributes to a
	# remaining post-suspend lock after the kernel and ignorelid fixes.
	Option "DRI" "2"
EndSection

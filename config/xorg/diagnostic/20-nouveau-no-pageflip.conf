Section "ServerFlags"
	Option "DontZap" "false"
EndSection

Section "InputClass"
	Identifier "Keyboard Defaults"
	MatchIsKeyboard "Yes"
	Option "XkbOptions" "terminate:ctrl_alt_bksp"
EndSection

Section "Device"
	Identifier "Nouveau GT330M via KMS"
	Driver "modesetting"
	Option "AccelMethod" "glamor"
	# Diagnostic fallback: Present copies retire directly instead of waiting
	# for a DRM page-flip completion that may be lost across VT/S3 transitions.
	Option "PageFlip" "false"
EndSection
